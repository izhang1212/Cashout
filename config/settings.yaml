kalshi:
  demo_base_url: https://demo-api.kalshi.co/trade-api/v2
  prod_base_url: https://api.kalshi.com/trade-api/v2
  ws_url: wss://api.kalshi.com/trade-api/ws/v2
  poll_interval_sec: 5
  rfq_fallback: false
game_feed:
  provider: nba_api
  poll_interval_sec: 2             # down from 3; safe floor for nba_api CDN refresh rate
  late_game_poll_interval_sec: 1   # used when tau_minutes <= late_game_threshold_min
  late_game_threshold_min: 3       # last 3 game-minutes = ~6 min real time (stoppages)
model:
  sigma_per_min: 2.2845
  spread_to_mu: true
  mc_paths: 20000
  copula_default_rho: 0.05
  sigma_calibration_note: fit from 2024-25 final margins (N=1225 home games); micro-QV
    gives 3.2 but game-level fit gives 2.28
  copula_rho_note: empirical rho(moneyline,total) = 0.009 from 2024-25 (N=1225); 0.05
    adds small floor for in-game state-conditional residual
decision:
  dp_time_step_sec: 30
  dp_diff_range: 45
  risk_aversion: 0.0
  robust_ensemble_size: 5
  shrinkage_unproven_weight: 0.7
bid_model:
  a: 0.03
  b: 0.25
  c: 3.0
paths:
  bid_log_dir: data/logs/bids
  game_log_dir: data/logs/games
